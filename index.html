<!DOCTYPE html>
<html>
<head>
<title>SecureVault</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
background:url('https://images.unsplash.com/photo-1510511233900-1982d92bd835') center/cover;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
}

/* PARTICLES */
.particle{
position:absolute;
width:3px;height:3px;
background:cyan;
animation:float 8s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* SCREEN */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:2;
text-align:center;
}
.hidden{display:none;}

/* CARD */
.container{
width:420px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,255,255,0.3);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

/* BUTTON */
button{
margin-top:8px;
padding:10px;
width:100%;
border-radius:10px;
border:2px solid cyan;
background:transparent;
color:cyan;
cursor:pointer;
transition:0.3s;
}
button:hover{
background:cyan;
color:black;
box-shadow:0 0 15px cyan;
}

/* DASHBOARD CARDS */
.card{
padding:15px;
background:rgba(0,0,0,0.5);
border-radius:12px;
text-align:center;
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}
.card h3{font-size:14px;color:cyan;}
.card p{font-size:20px;font-weight:bold;margin-top:5px;}

/* BAR */
.bar{
height:8px;
background:#1e293b;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}
.fill{
height:100%;
width:0%;
transition:0.4s;
}

.result{margin-top:10px;font-size:18px;font-weight:bold;}
.small{font-size:13px;margin-top:5px;}

#toast{
display:none;
position:fixed;
bottom:20px;
background:cyan;
color:black;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<script>
for(let i=0;i<50;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(4+Math.random()*6)+"s";
document.body.appendChild(p);
}
</script>

<!-- WELCOME -->
<div id="welcome" class="screen">
<h1 id="typing"></h1>
<p>Ultimate Cyber Security Platform 🔐</p>
<button onclick="start()">Get Started 🚀</button>
</div>

<!-- APP -->
<div id="app" class="screen hidden">
<div class="container">

<h2>🔐 Password Tool</h2>

<input id="pass" type="password" placeholder="Enter Password">

<button onclick="toggle()">👁️ Show/Hide</button>
<button onclick="generate()">🎲 Generate</button>
<button onclick="copy()">📋 Copy</button>
<button onclick="toggleTheme()">🌙 Theme</button>

<div class="bar"><div id="fill" class="fill"></div></div>

<div id="result" class="result"></div>
<div id="percent" class="small"></div>
<div id="time" class="small"></div>
<div id="common" class="small"></div>
<div id="tips" class="small"></div>

</div>
</div>

<div id="toast">Copied!</div>

<script>

/* TYPING */
let text="🔐 Welcome to SecureVault";
let i=0;
function type(){
if(i<text.length){
typing.innerHTML+=text[i];
i++;
setTimeout(type,40);
}}
window.onload=type;

/* START */
function start(){
welcome.classList.add("hidden");
app.classList.remove("hidden");
}

/* ELEMENTS */
let pass=document.getElementById("pass");
let fill=document.getElementById("fill");
let result=document.getElementById("result");
let percent=document.getElementById("percent");
let time=document.getElementById("time");
let common=document.getElementById("common");
let tips=document.getElementById("tips");

/* COMMON */
let commonList=["123456","password","admin","qwerty"];

/* PASSWORD CHECK */
pass.addEventListener("input",()=>{
let v=pass.value;
let score=0;
let sug=[];

if(v.length>=8){score+=25;}else{sug.push("Use 8+ chars");}
if(/[A-Z]/.test(v)){score+=25;}else{sug.push("Add uppercase");}
if(/[0-9]/.test(v)){score+=25;}else{sug.push("Add number");}
if(/[!@#$%^&*]/.test(v)){score+=25;}else{sug.push("Add special char");}

/* COMMON */
if(commonList.includes(v.toLowerCase())){
common.innerHTML="❌ Common password!";
score=10;
}else{common.innerHTML="";}

/* UI */
fill.style.width=score+"%";
percent.innerHTML="Score: "+score+"/100";

/* RESULT */
if(score<=25){
fill.style.background="red";
result.innerHTML="Weak 😡";
time.innerHTML="Crack Time: Seconds";
}
else if(score<=75){
fill.style.background="orange";
result.innerHTML="Medium 😐";
time.innerHTML="Crack Time: Hours";
}
else{
fill.style.background="lime";
result.innerHTML="Strong 😎";
time.innerHTML="Crack Time: Years 🔥";
}

/* AI */
let aiMsg="🤖 AI: ";
if(v.length<6) aiMsg+="Too short. ";
if(v.includes("123")) aiMsg+="Pattern detected. ";
if(v.toLowerCase().includes("password")) aiMsg+="Common word. ";
if(score==100) aiMsg="🔥 Perfect Password!";
tips.innerHTML=aiMsg;

/* SUGGEST */
if(sug.length>0){
tips.innerHTML+="<br>💡 "+sug.join(", ");
}

/* SMART */
if(score<50 && v.length>0){
tips.innerHTML+="<br>✨ Try: "+v+"@2026#X";
}

/* GLOW */
if(score==100){
document.querySelector(".container").style.boxShadow="0 0 60px lime";
}else{
document.querySelector(".container").style.boxShadow="0 0 40px cyan";
}

});

/* FUNCTIONS */
function toggle(){pass.type=pass.type==="password"?"text":"password";}
function generate(){
let c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
let p="";
for(let i=0;i<12;i++)p+=c[Math.floor(Math.random()*c.length)];
pass.value=p;
pass.dispatchEvent(new Event("input"));
}
function copy(){
navigator.clipboard.writeText(pass.value);
toast.style.display="block";
setTimeout(()=>toast.style.display="none",2000);
}
function toggleTheme(){
if(document.body.style.background=="white"){
location.reload();
}else{
document.body.style.background="white";
document.body.style.color="black";
}
}

</script>

</body>
</html>
